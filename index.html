<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ארכיון וידאו אישי</title>
  <style>
    :root{
      --bg:#f7f7f5;
      --surface:#ffffff;
      --surface-2:#f2f2ee;
      --text:#1e1e1b;
      --muted:#6f6f69;
      --border:#dfdfd8;
      --primary:#0f6b6f;
      --primary-light:#e5f3f4;
      --tag:#eef6f6;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:24px 16px 48px;
    }
    .hero{
      text-align:center;
      margin-bottom:24px;
    }
    h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
    }
    .sub{
      color:var(--muted);
      margin-bottom:20px;
    }
    .search{
      position:relative;
      max-width:700px;
      margin:0 auto;
    }
    .search input{
      width:100%;
      padding:16px 18px;
      border:1px solid var(--border);
      border-radius:999px;
      font-size:16px;
      outline:none;
      background:var(--surface);
      box-shadow:var(--shadow);
    }
    .toolbar{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      margin:24px 0 16px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .field label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }
    .field select, .field button{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--surface-2);
      font-size:14px;
    }
    .field button{
      background:var(--primary);
      color:white;
      cursor:pointer;
      border:none;
      font-weight:700;
      align-self:end;
      margin-top:auto;
    }
    .topline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:12px 0 18px;
      color:var(--muted);
      flex-wrap:wrap;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:16px;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:.18s ease;
    }
    .card:hover{
      transform:translateY(-2px);
      border-color:var(--primary);
    }
    .titleRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .title{
      font-weight:700;
      font-size:18px;
    }
    .year{
      font-size:12px;
      background:#f0eee8;
      color:#5f5c57;
      border-radius:999px;
      padding:4px 8px;
      white-space:nowrap;
    }
    .meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .badge{
      font-size:12px;
      border-radius:999px;
      padding:4px 8px;
      background:#fdf0e5;
      color:#9a4f16;
    }
    .badge.secondary{
      background:#eef6f6;
      color:var(--primary);
    }
    .desc{
      color:var(--muted);
      font-size:14px;
      min-height:42px;
    }
    .tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .tag{
      font-size:12px;
      border-radius:999px;
      padding:4px 8px;
      background:var(--tag);
      color:var(--primary);
      cursor:pointer;
      transition:.15s ease;
    }
    .tag:hover{
      background:var(--primary);
      color:#fff;
    }
    .tag.active{
      background:var(--primary);
      color:#fff;
    }
    /* List view */
    #grid.list-view{
      display:flex;
      flex-direction:column;
      gap:0;
    }
    #grid.list-view .card{
      border-radius:0;
      border-left:none;
      border-right:none;
      border-top:none;
      box-shadow:none;
      padding:10px 14px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:12px;
    }
    #grid.list-view .card:first-child{border-top:1px solid var(--border); border-radius:var(--radius) var(--radius) 0 0;}
    #grid.list-view .card:last-child{border-radius:0 0 var(--radius) var(--radius);}
    #grid.list-view .card:hover{transform:none; background:var(--surface-2);}
    #grid.list-view .titleRow{margin-bottom:0; flex:none;}
    #grid.list-view .title{font-size:15px;}
    #grid.list-view .meta{margin-bottom:0; flex-wrap:nowrap;}
    #grid.list-view .desc{display:none;}
    #grid.list-view .tags{margin-top:0; flex-wrap:nowrap; overflow:hidden;}
    #grid.list-view .list-main{display:flex; align-items:center; gap:10px; min-width:0; overflow:hidden;}
    #grid.list-view .list-right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
    /* Sort / view controls */
    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .sort-group{
      display:flex;
      align-items:center;
      gap:6px;
    }
    .sort-group label{font-size:12px; color:var(--muted); font-weight:700;}
    .sort-group select{
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:var(--surface);
      font-size:13px;
      cursor:pointer;
    }
    .view-toggle{
      display:flex;
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
      background:var(--surface);
    }
    .view-btn{
      padding:6px 12px;
      background:none;
      border:none;
      cursor:pointer;
      font-size:14px;
      color:var(--muted);
      transition:.15s;
    }
    .view-btn.active{
      background:var(--primary);
      color:#fff;
    }
    .empty{
      display:none;
      text-align:center;
      color:var(--muted);
      padding:40px 0;
    }
    .empty.visible{display:block}
    .modalWrap{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .modalWrap.open{display:flex}
    .modal{
      width:min(680px,100%);
      max-height:90vh;
      overflow:auto;
      background:var(--surface);
      border-radius:20px;
      padding:20px;
      box-shadow:0 20px 50px rgba(0,0,0,.2);
    }
    .modalTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:16px;
    }
    .closeBtn{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 12px;
      cursor:pointer;
    }
    .path{
      direction:ltr;
      text-align:left;
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      font-size:13px;
      word-break:break-all;
    }
    .openLink{
      display:inline-block;
      margin-top:14px;
      background:var(--primary);
      color:#fff;
      text-decoration:none;
      padding:10px 16px;
      border-radius:12px;
      font-weight:700;
    }
    @media (max-width:900px){
      .toolbar{grid-template-columns:1fr 1fr}
    }
    @media (max-width:560px){
      .toolbar{grid-template-columns:1fr}
    }
  </style>
</head>

  <div class="container">
    <section class="hero">
      <h1>ארכיון וידאו אישי</h1>
      <div class="sub">חיפוש פשוט ומהיר לפי שם, שנה, אנשים, סוג ותגיות</div>

      </div>

    <section class="toolbar">
      <div class="field">
        <label for="yearFilter">שנה</label>
        <select id="yearFilter">

        </select>
      </div>

      <div class="field">
        <label for="peopleFilter">אנשים</label>
        <select id="peopleFilter">
          <option value="">כולם</option>
        </select>
      </div>

      <div class="field">
        <label for="typeFilter">סוג</label>
        <select id="typeFilter">
          <option value="">הכל</option>
        </select>
      </div>

      <div class="field">
        <label for="categoryFilter">קטגוריה</label>
        <select id="categoryFilter">
          <option value="">הכל</option>
        </select>
      </div>

      <div class="field">
        <label>&nbsp;</label>
        <button id="resetBtn">איפוס סינון</button>
      </div>
    </section>

    <div class="topline">
      <div id="resultsCount">0 תוצאות</div>
      <div class="controls">
        <div class="sort-group">
          <label for="sortSelect">מיון:</label>
          <select id="sortSelect">
            <option value="year-desc">שנה (חדש לישן)</option>

            <option value="name-desc">כותרת ת–א</option>

        </div>
        <div class="view-toggle">

          <button class="view-btn" id="listBtn" title="תצוגת רשימה">☰</button>
        </div>
      </div>
    </div>

    <section id="grid" class="grid"></section>
    <div id="empty" class="empty">לא נמצאו תוצאות.</div>
  </div>

  <div id="modalWrap" class="modalWrap">
    <div class="modal">
      <div class="modalTop">
        <div>
          <h2 id="modalTitle" style="margin:0 0 8px;"></h2>
          <div id="modalMeta" class="meta"></div>
        </div>
        <button id="closeBtn" class="closeBtn">סגור</button>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:12px;color:#6f6f69;font-weight:700;margin-bottom:6px;">תיאור</div>
        <div id="modalDescription"></div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:12px;color:#6f6f69;font-weight:700;margin-bottom:6px;">תגיות</div>
        <div id="modalTags" class="tags"></div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:12px;color:#6f6f69;font-weight:700;margin-bottom:6px;">מיקום הקובץ</div>
        <div id="modalPath" class="path"></div>
      </div>
      <a id="openLink" class="openLink" href="#" target="_blank" rel="noopener">פתח סרטון</a>
    </div>
  </div>

    function escapeRegExp(str) {
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    const HEBREW_KEYS = Object.keys(HEBREW_MAP).sort((a, b) => b.length - a.length);

    function displayText(value) {
      if (Array.isArray(value)) return value.map(v => displayText(v)).join(", ");
      let text = String(value ?? "");
      HEBREW_KEYS.forEach(key => {
        text = text.replace(new RegExp(`\\b${escapeRegExp(key)}\\b`, "g"), HEBREW_MAP[key]);
      });
      return text;
    }

    function displayDescription(value) {
      const text = displayText(value || "");
      const parts = text.split("|").map(s => s.trim()).filter(Boolean);
      const filtered = parts.filter(part => !/[A-Za-z]/.test(part));
      return filtered.length ? filtered.join(" | ") : text;
    }

    function searchableVideoText(video) {
      return [
        video.name,
        displayText(video.name),
        video.description,
        displayDescription(video.description),
        video.type,
        displayText(video.type),
        video.category,
        displayText(video.category),
        ...(video.people || []),
        displayText(video.people || []),
        ...(video.tags || []),
        displayText(video.tags || []),
        video.year
      ].join(" ");
    }

      return [...new Set(values)].sort((a, b) => String(a).localeCompare(String(b), "he"));

    function fillSelect(select, values) {
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;

        const typeOk = !state.type || video.type === state.type;
        const categoryOk = !state.category || video.category === state.category;
        const tagOk = !state.tag || (video.tags || []).includes(state.tag) || (video.people || []).includes(state.tag);
        return searchOk && yearOk && personOk && typeOk && categoryOk && tagOk;
      });

      filtered.sort((a, b) => {
        if (state.sort === "year-desc") return b.year - a.year || a.name.localeCompare(b.name, "he");
        if (state.sort === "year-asc")  return a.year - b.year || a.name.localeCompare(b.name, "he");
        if (state.sort === "name-asc")  return a.name.localeCompare(b.name, "he");
        if (state.sort === "name-desc") return b.name.localeCompare(a.name, "he");
        return 0;
      });
      return filtered;
    }

    function tagHTML(text, isActive) {
      return `<span class="tag${isActive ? ' active' : ''}" data-tag="${escHtml(text)}">${escHtml(displayText(text))}</span>`;
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function render() {
      const items = getSortedFiltered();
      resultsCount.textContent = `${items.length} תוצאות`;
      grid.innerHTML = "";
      grid.className = state.view === "list" ? "grid list-view" : "grid";

      if (!items.length) { empty.classList.add("visible"); return; }
      empty.classList.remove("visible");

      const isList = state.view === "list";

      items.forEach(video => {
        const card = document.createElement("article");
        card.className = "card";
        const allTags = [...(video.tags || [])];
        const allPeople = [...(video.people || [])];
        const yearLabel = video.year || "—";

        if (isList) {
          card.innerHTML = `
            <div class="year" style="flex-shrink:0">${yearLabel}</div>
            <div class="list-main">
              <div class="title">${escHtml(displayText(video.name))}</div>
              <div class="tags">
                ${allPeople.map(p => tagHTML(p, state.tag === p)).join("")}
                ${allTags.slice(0,3).map(t => tagHTML(t, state.tag === t)).join("")}
              </div>
            </div>
            <div class="list-right">
              <span class="badge">${escHtml(displayText(video.type))}</span>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="titleRow">
              <div class="title">${escHtml(displayText(video.name))}</div>
              <div class="year">${yearLabel}</div>
            </div>
            <div class="meta">
              <span class="badge">${escHtml(displayText(video.type))}</span>
              <span class="badge secondary">${escHtml(displayText(video.category))}</span>
            </div>
            <div class="desc">${escHtml(displayDescription(video.description))}</div>
            <div class="tags">
              ${allPeople.map(p => tagHTML(p, state.tag === p)).join("")}
              ${allTags.slice(0,4).map(t => tagHTML(t, state.tag === t)).join("")}
            </div>
          `;
        }

        // Tag click — stops propagation so card modal doesn't open
        card.querySelectorAll(".tag").forEach(el => {
          el.addEventListener("click", e => {
            e.stopPropagation();
            const clicked = el.dataset.tag;
            state.tag = state.tag === clicked ? "" : clicked;
            render();
          });
        });

        card.addEventListener("click", () => openModal(video));
        grid.appendChild(card);
      });
    }

    function openModal(video) {
      modalTitle.textContent = displayText(video.name);
      modalMeta.innerHTML = `
        <span class="badge">${escHtml(displayText(video.type))}</span>
        <span class="badge secondary">${escHtml(displayText(video.category))}</span>
        <span class="year">${video.year || "—"}</span>
      `;
      modalDescription.textContent = displayDescription(video.description);
      // Tags in modal are also clickable
      const tagsHtml = [
        ...(video.people || []).map(p => tagHTML(p, state.tag === p)),
        ...(video.tags || []).map(t => tagHTML(t, state.tag === t))
      ].join("");
      modalTags.innerHTML = tagsHtml;
      modalTags.querySelectorAll(".tag").forEach(el => {
        el.addEventListener("click", () => {
          const clicked = el.dataset.tag;
          state.tag = state.tag === clicked ? "" : clicked;
          closeModal();
          render();
        });
      });
      modalPath.textContent = video.path || "";
      openLink.href = video.path || "#";
      modalWrap.classList.add("open");
    }

    function closeModal() { modalWrap.classList.remove("open"); }

    function resetAll() {
      state.search = ""; state.year = ""; state.person = "";
      state.type = ""; state.category = ""; state.tag = "";
      searchInput.value = "";
      yearFilter.value = ""; peopleFilter.value = "";
      typeFilter.value = ""; categoryFilter.value = "";
      render();
    }

    searchInput.addEventListener("input", e => { state.search = e.target.value; render(); });
    yearFilter.addEventListener("change", e => { state.year = e.target.value; render(); });
    peopleFilter.addEventListener("change", e => { state.person = e.target.value; render(); });
    typeFilter.addEventListener("change", e => { state.type = e.target.value; render(); });
    categoryFilter.addEventListener("change", e => { state.category = e.target.value; render(); });
    sortSelect.addEventListener("change", e => { state.sort = e.target.value; render(); });
    resetBtn.addEventListener("click", resetAll);

    gridBtn.addEventListener("click", () => {
      state.view = "grid";
      gridBtn.classList.add("active"); listBtn.classList.remove("active");
      render();
    });
    listBtn.addEventListener("click", () => {
      state.view = "list";
      listBtn.classList.add("active"); gridBtn.classList.remove("active");
      render();
    });

    closeBtn.addEventListener("click", closeModal);
    modalWrap.addEventListener("click", e => { if (e.target === modalWrap) closeModal(); });

    render();
  </script>
</body>
</html>
